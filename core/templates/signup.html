      body {
        font-family: "Poppins", sans-serif;
      }
      .form-container {
        background-color: #f0f4f8;
      }
      .card {
        background-color: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        padding: 40px;
      }
      .input-field {
        background-color: #e6ecf2;
        border: 1px solid #d1d9e6;
        border-radius: 12px;
        padding: 12px 16px;
        width: 100%;
        transition: all 0.3s ease;
      }
      .input-field:focus {
        outline: none;
        border-color: #63b3ed;
        box-shadow: 0 0 0 3px rgba(99, 179, 237, 0.3);
      }
      .btn-primary {
        background-color: #0d9488;
        color: white;
        font-weight: 600;
        border-radius: 12px;
        padding: 12px 16px;
        width: 100%;
        transition: background-color 0.3s ease;
      }
      .btn-primary:hover {
        background-color: #115e59;
      }
      .btn-social {
        border: 1px solid #d1d9e6;
        border-radius: 12px;
        padding: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }
      .btn-social:hover {
        background-color: #f0f4f8;
        border-color: #a3b1c2;
      }
      .password-strength {
        height: 4px;
        border-radius: 2px;
        background-color: #e6ecf2;
        width: 100%;
        margin-top: 8px;
      }
      .strength-indicator {
        height: 100%;
        border-radius: 2px;
        transition: width 0.3s ease, background-color 0.3s ease;
      }
      .checkbox-container {
        display: flex;
        align-items: center;
      }
      .custom-checkbox {
        appearance: none;
        width: 20px;
        height: 20px;
        border: 2px solid #d1d9e6;
        border-radius: 6px;
        margin-right: 12px;
        cursor: pointer;
        position: relative;
        transition: all 0.3s ease;
      }
      .custom-checkbox:checked {
        background-color: #0d9488;
        border-color: #0d9488;
      }
      .custom-checkbox:checked::after {
        content: "✓";
        color: white;
        font-size: 14px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
    </style>

    <!-- Supabase SignUp Script -->
    <script src="{% url 'config_js' %}"></script>
    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const supabaseUrl = window.MANN_MITRA_CONFIG.SUPABASE_URL;
      const supabaseKey = window.MANN_MITRA_CONFIG.SUPABASE_KEY; 
      const supabase = createClient(supabaseUrl, supabaseKey);

      const form = document.getElementById("signup-form");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email-address").value;
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("password-confirm").value;

        if (password !== confirmPassword) {
          alert("Passwords do not match!");
          return;
        }

      // Get all form fields
      const fullName = document.getElementById("full-name").value;
      const phone = document.getElementById("phone-number").value;
      const gender = document.getElementById("gender").value;
      const dob = document.getElementById("dob").value;
      const institution = document.getElementById("institution").value;
      const language = document.getElementById("language").value;
      const concerns = Array.from(document.querySelectorAll('input[name="concerns"]:checked')).map(c => c.value);

      // Insert profile into Supabase
        const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name: fullName,
            phone: phone,
            gender: gender,
            dob: dob,
            institution: institution,
            language: language,
            concerns: concerns.join(",")
          }
        }
      });

      if (error) {
        console.error("Profile insert error:", error);
        alert("Database Error: " + error.message);
        return;
      }
      console.log("Signup data:", data);      
      alert("Account Created Successfully!");
      window.location.href = "/login/";
      }
    );

    </script>


     Password strength checker 
    <script>
      const passwordInput = document.getElementById("password");
      const strengthBar = document.getElementById("strength-bar");

      passwordInput.addEventListener("input", () => {
        const password = passwordInput.value;
        let strength = 0;
        if (password.length >= 8) strength++;
        if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
        if (password.match(/\d/)) strength++;
        if (password.match(/[^a-zA-Z\d]/)) strength++;

        let color = "bg-gray-300";
        let width = "0%";

        switch (strength) {
          case 1: width = "25%"; color = "bg-red-500"; break;
          case 2: width = "50%"; color = "bg-yellow-500"; break;
          case 3: width = "75%"; color = "bg-blue-500"; break;
          case 4: width = "100%"; color = "bg-green-500"; break;
        }
        strengthBar.style.width = width;
        strengthBar.className = `strength-indicator ${color}`;
      });
    </script>
